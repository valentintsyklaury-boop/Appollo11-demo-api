name: Generate Lockfile

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Ensure this is a Node project
        run: |
          if [ ! -f package.json ]; then
            echo "ERROR: package.json not found in repo root. If your Node app is in a subfolder, we must run npm install there."
            ls -la
            exit 1
          fi

      - name: Generate lockfile (without running scripts)
        run: npm install --package-lock-only --ignore-scripts

      - name: Show generated files (debug)
        run: |
          ls -la
          test -f package-lock.json && echo "package-lock.json created ✅" || (echo "package-lock.json NOT created ❌" && exit 1)

      - name: Commit and push lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Add package-lock.json" || echo "Nothing to commit"
          git push
